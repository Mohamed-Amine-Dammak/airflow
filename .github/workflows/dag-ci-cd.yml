name: DAG CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "dags/**"
      - ".github/workflows/dag-ci-cd.yml"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff black pytest

      - name: List DAG Python files
        run: find dags -type f -name "*.py" | sort

      - name: Syntax check
        run: python -m compileall -q dags

      - name: Lint check
        run: ruff check dags || true

      - name: Format check
        run: black --check dags || true

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose --redact

  cd:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Fake deploy
        run: echo "CD step reached"
