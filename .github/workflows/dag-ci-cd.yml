name: DAG CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "dags/**"
      - ".github/workflows/dag-ci-cd.yml"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff black pytest

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          wget -qO gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: List DAG Python files
        run: find dags -type f -name "*.py" | sort

      - name: Syntax check
        run: python -m compileall -q dags

      - name: Lint check
        run: ruff check dags || true

      - name: Format check
        run: black --check dags || true

      - name: Secret scan only DAGs
        run: |
          gitleaks detect --source dags --no-git --verbose --redact

  cd:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Fake deploy
        run: echo "CD step reached"
