name: DAG CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "dags/**"
      - ".github/workflows/dag-ci-cd.yml"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff black pytest

      - name: Install Gitleaks
        run: |
          set -e
          GITLEAKS_VERSION=8.30.1
          curl -fL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks

      - name: List DAG Python files
        run: find dags -type f -name "*.py" | sort

      - name: Syntax check
        run: python -m compileall -q dags

      - name: Lint check
        run: ruff check dags || true

      - name: Format check
        run: black --check dags || true

      - name: Secret scan only DAGs
        run: |
          ./gitleaks detect --source dags --no-git --verbose --redact

  airflow-validate:
    runs-on: [self-hosted, Windows, X64]
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Docker is running
        shell: powershell
        run: |
          docker ps

      - name: Airflow DAG list check in scheduler container
        shell: powershell
        run: |
          docker exec airflowgitfresh-airflow-scheduler-1 airflow dags list

      - name: Airflow DAG import check in scheduler container
        shell: powershell
        run: |
          docker exec airflowgitfresh-airflow-scheduler-1 python -c "from airflow.models.dagbag import DagBag; dag_bag = DagBag(include_examples=False); import_errors = dag_bag.import_errors; import sys; print(f'Loaded DAGs successfully: {len(dag_bag.dags)}'); [print(f'\n- {file}\n{err}') for file, err in import_errors.items()]; sys.exit(1 if import_errors else 0)"

  cd:
    runs-on: ubuntu-latest
    needs: airflow-validate

    steps:
      - name: Fake deploy
        run: echo "CD step reached"
